<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glowGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFD600"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Glow halo behind banana -->
  <ellipse cx="95" cy="105" rx="72" ry="80" fill="#FFE57F" opacity="0.3"/>
  <!-- Shadow -->
  <ellipse cx="100" cy="175" rx="55" ry="12" fill="rgba(200,150,0,0.2)"/>
  <!-- Stem -->
  <path d="M95 30 Q90 15 80 10 Q88 18 92 32" fill="#5D3A00" stroke="#3a1f00" stroke-width="1.5"/>
  <!-- Main body (bright shining) -->
  <path d="M92 35 Q60 50 45 90 Q35 120 50 155 Q60 175 80 178 Q100 180 115 170 Q130 158 135 135 Q142 105 138 75 Q134 50 115 38 Q105 32 92 35Z"
        fill="url(#glowGrad)" stroke="#FDD835" stroke-width="2" filter="url(#glow)"/>
  <!-- Highlight -->
  <path d="M98 40 Q72 55 58 92 Q50 118 62 150 Q70 170 85 172"
        fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <!-- Tip -->
  <path d="M50 155 Q45 165 48 172 Q52 160 58 158" fill="#5D3A00"/>
  <!-- Excited star eyes (bigger) -->
  <g transform="translate(90,100)">
    <polygon points="0,-10 2.5,-3.5 9,-3.5 4,1.5 6,9 0,4 -6,9 -4,1.5 -9,-3.5 -2.5,-3.5" fill="#3a2000"/>
    <circle cx="0" cy="0" r="2.5" fill="#FFE57F"/>
  </g>
  <g transform="translate(116,95)">
    <polygon points="0,-10 2.5,-3.5 9,-3.5 4,1.5 6,9 0,4 -6,9 -4,1.5 -9,-3.5 -2.5,-3.5" fill="#3a2000"/>
    <circle cx="0" cy="0" r="2.5" fill="#FFE57F"/>
  </g>
  <!-- Blush (bright) -->
  <ellipse cx="79" cy="114" rx="10" ry="6" fill="#FFAB40" opacity="0.5"/>
  <ellipse cx="122" cy="109" rx="10" ry="6" fill="#FFAB40" opacity="0.5"/>
  <!-- Open excited smile -->
  <path d="M85 120 Q102 138 120 120" fill="none" stroke="#3a2000" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Sparkles around -->
  <text x="40" y="55" font-size="14" opacity="0.8">✨</text>
  <text x="140" y="60" font-size="14" opacity="0.8">✨</text>
  <text x="36" y="145" font-size="12" opacity="0.7">✨</text>
  <text x="140" y="150" font-size="12" opacity="0.7">✨</text>
</svg>
