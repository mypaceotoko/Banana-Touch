  <path d="M98 40 Q72 55 58 92 Q50 118 62 150 Q70 170 85 172"
        fill="none" stroke="#FFFFF0" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  <path d="M110 45 Q95 60 88 90"
