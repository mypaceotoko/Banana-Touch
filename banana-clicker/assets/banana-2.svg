<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="goldGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="50%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="100" cy="175" rx="55" ry="12" fill="rgba(180,100,0,0.2)"/>
  <!-- Stem -->
  <path d="M95 30 Q90 15 80 10 Q88 18 92 32" fill="#5D3A00" stroke="#3a1f00" stroke-width="1.5"/>
  <!-- Main body (gold) -->
  <path d="M92 35 Q60 50 45 90 Q35 120 50 155 Q60 175 80 178 Q100 180 115 170 Q130 158 135 135 Q142 105 138 75 Q134 50 115 38 Q105 32 92 35Z"
        fill="url(#goldGrad)" stroke="#F9A825" stroke-width="2"/>
