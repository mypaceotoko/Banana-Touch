  <!-- Tip -->
  <path d="M50 155 Q45 165 48 172 Q52 160 58 158" fill="#5D3A00"/>
  <!-- Star eyes -->
  <!-- Left star eye -->
  <g transform="translate(90,100)">
    <polygon points="0,-8 2,-3 7,-3 3,1 5,7 0,3 -5,7 -3,1 -7,-3 -2,-3" fill="#3a2000"/>
  </g>
  <!-- Right star eye -->
  <g transform="translate(116,95)">
    <polygon points="0,-8 2,-3 7,-3 3,1 5,7 0,3 -5,7 -3,1 -7,-3 -2,-3" fill="#3a2000"/>
  </g>
  <!-- Blush (gold toned) -->
  <ellipse cx="80" cy="114" rx="9" ry="6" fill="#FF8F00" opacity="0.35"/>
  <ellipse cx="122" cy="109" rx="9" ry="6" fill="#FF8F00" opacity="0.35"/>
  <!-- Confident smile -->
  <path d="M86 120 Q102 135 119 120" fill="none" stroke="#3a2000" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Sparkle decorations -->
  <text x="138" y="65" font-size="16" opacity="0.9">✦</text>
  <text x="50" y="78" font-size="11" opacity="0.7">✦</text>
  <text x="130" y="148" font-size="10" opacity="0.6">✦</text>
