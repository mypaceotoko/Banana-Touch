      </g>
    </g>
    <!-- Blush (violet) -->
    <ellipse cx="74"  cy="119" rx="10" ry="6" fill="#CE93D8" opacity="0.5"/>
    <ellipse cx="115" cy="112" rx="10" ry="6" fill="#CE93D8" opacity="0.5"/>
    <!-- Cosmic smile -->
    <path d="M78 129 Q94 142 113 129" fill="none" stroke="#EDE7F6" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Stars -->
    <g filter="url(#glow5)" opacity="0.9">
      <polygon points="38,46  39.5,51 45,51 40.5,54.5 42.5,59.5 38,56 33.5,59.5 35.5,54.5 31,51  36.5,51"  fill="#FFE57F"/>
      <polygon points="152,52  153.5,57 159,57 154.5,60.5 156.5,65.5 152,62 147.5,65.5 149.5,60.5 145,57  150.5,57"  fill="#CE93D8"/>
      <polygon points="34,150 35.5,155 41,155 36.5,158.5 38.5,163.5 34,160 29.5,163.5 31.5,158.5 27,155 32.5,155" fill="#80DEEA"/>
      <polygon points="154,148 155.5,153 161,153 156.5,156.5 158.5,161.5 154,158 149.5,161.5 151.5,156.5 147,153 152.5,153" fill="#FFE57F"/>
    </g>
    <!-- Cosmic dust -->
    <circle cx="54"  cy="68"  r="2.2" fill="#CE93D8" opacity="0.65"/>
    <circle cx="146" cy="72"  r="2"   fill="#80DEEA" opacity="0.65"/>
    <circle cx="47"  cy="135" r="1.8" fill="#FFE57F" opacity="0.6"/>
