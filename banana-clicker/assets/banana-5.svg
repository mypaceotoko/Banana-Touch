    <ellipse cx="90" cy="108" rx="72" ry="84" fill="#3D1A8E" opacity="0.22"/>
    <ellipse cx="95" cy="192" rx="42" ry="9" fill="rgba(30,0,80,0.3)"/>
    <path d="M97 26 Q93 12 82 8 Q90 16 95 27" fill="#0D0020" stroke="#0D0020" stroke-width="1.5"/>
    <path d="M97 26 Q63 40 46 78 Q28 118 40 158 Q50 180 70 189 Q86 195 100 190 Q115 184 125 168 Q140 147 141 115 Q145 81 134 53 Q124 30 108 24 Q103 22 97 26Z"
