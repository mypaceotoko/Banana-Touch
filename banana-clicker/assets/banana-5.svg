<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Stage 5: コズミックバナナ - 最大・宇宙紫・発光星目 -->
  <defs>
    <radialGradient id="g5" cx="38%" cy="30%" r="68%">
      <stop offset="0%"   stop-color="#CE93D8"/>
      <stop offset="40%"  stop-color="#5E35B1"/>
      <stop offset="100%" stop-color="#1A0A3E"/>
    </radialGradient>
    <radialGradient id="eyeG" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="50%"  stop-color="#FFE57F"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(97,108) scale(1.40) translate(-97,-108)">
