<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banana Touch🍌</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- ヘッダー -->
    <header id="header">
      <div id="header-top">
        <button id="reset-btn" aria-label="リセット" title="ゲームを最初からやり直す">🔄</button>
        <div id="banana-count-wrap">
          <span id="banana-count">0</span>
          <span class="label"> 🍌BananaTouch🍌</span>
        </div>
        <button id="mute-btn" aria-label="ミュート切替" title="サウンド ON/OFF">🔊</button>
      </div>
      <div id="stats">
        <span>毎秒: <strong id="bps">0</strong></span>
        <span>クリック力: <strong id="click-power">1</strong></span>
      </div>
    </header>

    <!-- メインエリア -->
    <main id="main-area">
      <!-- バナナのステージ名 -->
      <div id="stage-label">🍌 バナナ</div>
      <!-- ステージインジケーター -->
      <div id="stage-indicator">
        <div class="stage-dot active" data-stage="0"></div>
        <div class="stage-dot" data-stage="1"></div>
        <div class="stage-dot" data-stage="2"></div>
        <div class="stage-dot" data-stage="3"></div>
        <div class="stage-dot" data-stage="4"></div>
        <div class="stage-dot" data-stage="5"></div>
      </div>
      <!-- コンボカウンター -->
      <div id="combo-display"></div>

      <div id="banana-wrap">
        <div id="banana" role="button" aria-label="バナナをタップ">
          <!-- #banana-body がスケール/シェイクを担当 -->
          <div id="banana-body">
            <img
              id="banana-img"
              src="assets/banana-stage1.svg"
              alt="🍌"
              onerror="this.style.display='none'; document.getElementById('banana-emoji').style.display='block';"
            />
            <span id="banana-emoji" style="display:none;">🍌</span>
          </div>
        </div>
        <!-- クリック時のエフェクトコンテナ -->
        <div id="effect-layer"></div>
      </div>
    </main>

    <!-- ショップ -->
    <section id="shop">
      <h2 class="shop-title">🛒 ショップ</h2>
      <div id="shop-items"></div>
    </section>

  </div>

  <!-- スクリプト（順番を厳守） -->
  <script src="game.js?v=3"></script>
  <script src="ui.js?v=3"></script>
  <script src="save.js?v=3"></script>
  <script src="sound.js?v=3"></script>
  <script src="main.js?v=3"></script>
</body>
</html>
