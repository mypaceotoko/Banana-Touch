<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <radialGradient id="bg5" cx="34%" cy="22%" r="72%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#FFF9C4"/>
      <stop offset="50%" stop-color="#FFD740"/>
      <stop offset="80%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <filter id="goldGlow5" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg5" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow rings -->
  <ellipse cx="108" cy="120" rx="104" ry="108" fill="none" stroke="#FFD740" stroke-width="4" opacity="0.25"/>
  <ellipse cx="108" cy="120" rx="94" ry="98" fill="none" stroke="#FFE082" stroke-width="2" opacity="0.2"/>
  <!-- Shadow -->
  <ellipse cx="108" cy="230" rx="62" ry="14" fill="rgba(0,0,0,0.20)"/>
  <!-- Stem -->
  <path d="M120 22 Q114 8 102 4 Q110 14 118 24" fill="#5a3e00" stroke="#3a2800" stroke-width="1.5"/>
  <!-- Main banana body: rich gold -->
  <path d="M120 20
           C104 20 86 34 72 60
           C58 86 52 118 56 148
           C60 174 74 196 94 206
           C108 214 124 214 136 206
           C150 196 158 178 160 154
           C164 126 160 92 148 66
           C138 44 130 28 120 20Z" fill="url(#bg5)" stroke="#B8860B" stroke-width="3" filter="url(#goldGlow5)"/>
  <!-- Highlight -->
  <path d="M92 30 C78 48 70 70 68 94 C66 118 70 140 80 158" fill="none" stroke="white" stroke-width="13" stroke-linecap="round" opacity="0.55"/>
  <path d="M102 28 C90 44 84 64 82 88" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <!-- Tip -->
  <path d="M56 148 C50 164 52 178 60 184 C62 168 68 158 76 154" fill="#4a2c00"/>
  
  <!-- Face: eyes -->
  <circle cx="104" cy="114" r="9.5" fill="#3a2000"/>
  <circle cx="130" cy="124" r="9.5" fill="#3a2000"/>
  <circle cx="106" cy="112" r="3.3" fill="white"/>
  <circle cx="132" cy="122" r="3.3" fill="white"/>
  <!-- Face: blush -->
  <ellipse cx="94" cy="130" rx="12" ry="7" fill="#ff8a80" opacity="0.55"/>
  <ellipse cx="140" cy="140" rx="12" ry="7" fill="#ff8a80" opacity="0.55"/>
  <!-- Face: smile -->
  <path d="M100 142 Q117 160 136 142" fill="none" stroke="#3a2000" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Large gold 4-point stars -->
  <path d="M190 11 L196 20 L205 26 L196 32 L190 41 L184 32 L175 26 L184 20 Z" fill="#FFD740" filter="url(#sg5)"/>
  <path d="M16 48 L21.5 56.5 L30 62 L21.5 67.5 L16 76 L10.5 67.5 L2 62 L10.5 56.5 Z" fill="#FFD740" filter="url(#sg5)"/>
  <path d="M198 156 L202.5 163.5 L210 168 L202.5 172.5 L198 180 L193.5 172.5 L186 168 L193.5 163.5 Z" fill="#FFA000" filter="url(#sg5)"/>
  <!-- Small sparkle stars -->
  <path d="M182 65 L184.5 69.5 L189 72 L184.5 74.5 L182 79 L179.5 74.5 L175 72 L179.5 69.5 Z" fill="#FFFDE7" opacity="0.9"/>
  <path d="M26 141 L28.5 145.5 L33 148 L28.5 150.5 L26 155 L23.5 150.5 L19 148 L23.5 145.5 Z" fill="#FFFDE7" opacity="0.9"/>
  <!-- Coins -->
  <circle cx="18" cy="192" r="13" fill="#FFD740" stroke="#B8860B" stroke-width="2" opacity="0.9"/>
  <text x="18" y="197" text-anchor="middle" font-size="12" fill="#7B5800" font-weight="bold">$</text>
  <circle cx="202" cy="200" r="11" fill="#FFD740" stroke="#B8860B" stroke-width="2" opacity="0.85"/>
  <text x="202" y="204" text-anchor="middle" font-size="10" fill="#7B5800" font-weight="bold">$</text>
  <!-- Shine dots -->
  <circle cx="140" cy="42" r="6" fill="white" opacity="0.55"/>
  <circle cx="162" cy="66" r="4" fill="white" opacity="0.4"/>
  <circle cx="152" cy="36" r="3" fill="white" opacity="0.5"/>
</svg>
